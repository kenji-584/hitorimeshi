<style>
:root{
  --bg:#FFF8F3;--bg2:#FFFBF7;--bg3:#F5EDE4;--dark:#2C2416;--dark2:#4A433A;--dark3:#6B6258;
  --accent:#E84E1B;--accent2:#D9401C;--accent-light:#FFE8DB;--green:#5BA876;--green-bg:rgba(91,168,118,0.1);
  --border:rgba(44,36,22,0.08);--border2:rgba(44,36,22,0.15);--border3:rgba(44,36,22,0.25);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--dark);font-family:'Bricolage Grotesque',sans-serif;font-size:16px;line-height:1.6;overflow-x:hidden;}
::selection{background:var(--accent);color:#fff;}
button{font-family:'Bricolage Grotesque',sans-serif;cursor:pointer;}
input,textarea,select{font-family:'Bricolage Grotesque',sans-serif;}

/* Desktop Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(255,248,243,0.95);backdrop-filter:blur(20px);}
.nav-logo{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:600;color:var(--dark);cursor:pointer;transition:opacity 0.15s;}
.nav-logo:hover{opacity:0.8;}
.nav-logo span{color:var(--accent);}
.nav-tabs{display:flex;gap:2px;}
.nav-tab{padding:7px 14px;border-radius:6px;font-size:13px;color:var(--dark3);background:transparent;border:none;transition:all 0.15s;}
.nav-tab.active,.nav-tab:hover{color:var(--dark);background:var(--bg3);}
.nav-right{display:flex;gap:8px;}

/* Mobile Bottom Nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(255,248,243,0.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0;height:60px;}
.bottom-nav.visible{display:flex;justify-content:space-around;align-items:center;}
.bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 12px;color:var(--dark3);font-size:11px;cursor:pointer;transition:all 0.15s;flex:1;text-align:center;}
.bottom-nav-item.active{color:var(--green);}
.bottom-nav-item-icon{font-size:20px;}

.checkin-btn{background:var(--green);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;transition:all 0.15s;}
.checkin-btn:hover{background:#4a955f;}
.report-btn{background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:500;transition:all 0.15s;}
.report-btn:hover{background:var(--accent2);}

.page{display:none;padding-top:65px;min-height:100vh;padding-bottom:0;}
.page.active{display:block;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.75);}}
@keyframes confetti{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(-100px) rotate(360deg);}}
@keyframes ripple{0%{transform:scale(0);opacity:1;}100%{transform:scale(4);opacity:0;}}
@keyframes skeleton{0%,100%{background:var(--bg3);}50%{background:var(--bg2);}}

.hero{padding:70px 36px 52px;position:relative;overflow:hidden;border-bottom:1px solid var(--border);background:linear-gradient(135deg, #FFF8F3 0%, #FFFBF7 100%);}
.hero-bg{position:absolute;top:50%;left:-40px;transform:translateY(-50%);font-family:'Noto Serif JP',serif;font-size:clamp(160px,26vw,360px);font-weight:900;color:transparent;-webkit-text-stroke:1px rgba(232,78,27,0.08);pointer-events:none;user-select:none;line-height:1;z-index:0;}
.hero-content{position:relative;z-index:1;}
.hero-live{display:inline-flex;align-items:center;gap:8px;background:var(--green-bg);border:1px solid rgba(91,168,118,0.25);padding:5px 12px;border-radius:20px;font-size:12px;color:var(--green);font-weight:500;margin-bottom:20px;width:fit-content;animation:fadeIn 0.6s ease-out;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.8s ease-in-out infinite;flex-shrink:0;}
.hero h1{font-family:'Noto Serif JP',serif;font-size:clamp(36px,5.5vw,72px);font-weight:900;line-height:1.06;letter-spacing:-0.02em;margin-bottom:16px;color:var(--dark);}
.hero h1 em{font-style:normal;color:var(--accent);}
.hero-sub{font-size:15px;color:var(--dark2);font-weight:300;max-width:420px;line-height:1.8;margin-bottom:28px;}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;}
.btn-primary{background:var(--accent);color:#fff;border:none;padding:11px 24px;border-radius:8px;font-size:14px;font-weight:600;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden;}
.btn-primary::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(0,0,0,0.1);transform:translate(-50%,-50%);transition:width 0.6s,height 0.6s;}
.btn-primary:active::before{width:300px;height:300px;}
.btn-primary:hover{background:var(--accent2);}
.btn-ghost{background:transparent;color:var(--accent);border:1px solid var(--accent);padding:11px 20px;border-radius:8px;font-size:14px;transition:all 0.15s;cursor:pointer;}
.btn-ghost:hover{background:var(--accent-light);}
.hero-stats{display:flex;gap:36px;margin-top:40px;padding-top:32px;border-top:1px solid var(--border);animation:slideUp 0.8s ease-out 0.1s both;}
.hstat-num{font-size:32px;font-weight:700;color:var(--dark);line-height:1;letter-spacing:-0.03em;}
.hstat-label{font-size:10px;color:var(--dark3);margin-top:3px;letter-spacing:0.06em;}

.search-area{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap input{width:100%;background:#fff;border:1px solid var(--border2);border-radius:8px;padding:9px 14px 9px 34px;font-size:13px;color:var(--dark);outline:none;transition:border-color 0.15s;box-shadow:0 1px 3px rgba(44,36,22,0.05);}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.search-wrap input::placeholder{color:var(--dark3);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dark3);font-size:14px;}

.chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);color:var(--dark3);background:transparent;transition:all 0.12s;cursor:pointer;}
.chip:hover{border-color:var(--dark2);color:var(--dark);}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent);}

/* Empty State */
.empty-state{padding:60px 28px;text-align:center;animation:slideUp 0.6s ease-out;}
.empty-state-icon{font-size:80px;margin-bottom:20px;animation:slideUp 0.6s ease-out 0.1s both;}
.empty-state h2{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:600;margin-bottom:8px;color:var(--dark);}
.empty-state p{font-size:14px;color:var(--dark3);margin-bottom:24px;}
.empty-state-cta{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}

/* Shop Cards - Review Card Style */
.shop-card{padding:16px 28px;border-bottom:1px solid var(--border);background:#fff;display:grid;grid-template-columns:1fr;gap:12px;animation:fadeIn 0.5s ease-out;contain:layout style;transition:background 0.12s;}
.shop-card:nth-child(1){animation-delay:0.05s;}
.shop-card:nth-child(2){animation-delay:0.1s;}
.shop-card:nth-child(3){animation-delay:0.15s;}
.shop-card:nth-child(n+4){animation-delay:0.2s;}
.shop-card:hover{background:var(--bg3);}

.shop-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
.shop-name-group{flex:1;}
.shop-name{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;color:var(--dark);}
.shop-genre{font-size:12px;color:var(--dark3);margin-top:4px;}
.shop-badges{display:flex;gap:8px;align-items:center;}
.bw{background:#EDEAE5;color:var(--green);font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.bw-net{background:#FFF3E0;color:#E65100;font-size:10px;font-weight:500;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;display:flex;align-items:center;gap:4px;}
.shop-name-link{color:var(--dark);text-decoration:none;cursor:pointer;transition:color 0.2s;}
.shop-name-link:hover{color:var(--accent);text-decoration:underline;}
.shop-dist-link{text-decoration:none;cursor:pointer;transition:opacity 0.2s;}
.shop-dist-link:hover{opacity:0.7;text-decoration:underline;}

.shop-info-row{display:flex;gap:16px;flex-wrap:wrap;align-items:center;}
.shop-meta{font-size:13px;color:var(--dark2);display:flex;align-items:center;gap:4px;font-weight:500;}
.shop-distance{font-size:13px;color:var(--accent);font-weight:600;}
.checkin-indicator{font-size:12px;color:var(--green);font-weight:500;display:flex;align-items:center;gap:4px;}

.shop-tags{display:flex;gap:6px;flex-wrap:wrap;}
.shop-tag{font-size:11px;padding:3px 9px;border-radius:6px;background:var(--bg3);color:var(--dark2);border:1px solid var(--border2);}

.shop-msg-section{background:var(--accent-light);border-left:3px solid var(--accent);padding:10px 12px;border-radius:4px;margin:8px 0 0 0;}
.shop-msg-label{font-size:10px;color:var(--accent);font-weight:600;letter-spacing:0.05em;margin-bottom:4px;}
.shop-msg{font-size:12px;color:var(--dark);line-height:1.6;font-style:italic;}

.shop-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:8px;}
.btn-ci{background:var(--green-bg);color:var(--green);border:1px solid rgba(91,168,118,0.25);padding:7px 13px;border-radius:6px;font-size:12px;font-weight:500;white-space:nowrap;transition:all 0.15s;cursor:pointer;position:relative;overflow:hidden;}
.btn-ci::before{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(91,168,118,0.3);transform:translate(-50%,-50%);transition:width 0.4s,height 0.4s;}
.btn-ci:active::before{width:100px;height:100px;}
.btn-ci:hover{background:rgba(91,168,118,0.2);}
.btn-rp{background:transparent;color:var(--dark3);border:1px solid var(--border);padding:7px 13px;border-radius:6px;font-size:12px;transition:all 0.15s;white-space:nowrap;cursor:pointer;}
.btn-rp:hover{color:var(--accent);border-color:var(--accent);}
.btn-map{background:transparent;color:var(--dark3);border:1px solid var(--border);padding:7px 13px;border-radius:6px;font-size:12px;transition:all 0.15s;white-space:nowrap;cursor:pointer;}
.btn-map:hover{color:#1a73e8;border-color:#1a73e8;}
.btn-share{background:transparent;color:var(--dark3);border:1px solid var(--border);padding:7px 13px;border-radius:6px;font-size:12px;transition:all 0.15s;white-space:nowrap;cursor:pointer;}
.btn-share:hover{color:var(--accent);border-color:var(--accent);}

.no-results{padding:60px 28px;text-align:center;color:var(--dark3);font-size:14px;}

.rpage-header{padding:36px 28px 20px;border-bottom:1px solid var(--border);}
.rpage-header h2{font-family:'Noto Serif JP',serif;font-size:28px;font-weight:600;margin-bottom:6px;color:var(--dark);}
.rpage-header p{font-size:14px;color:var(--dark2);}
.rstats{display:flex;gap:28px;margin-top:20px;}
.rstat-num{font-size:26px;font-weight:700;color:var(--dark);letter-spacing:-0.03em;}
.rstat-label{font-size:10px;color:var(--dark3);margin-top:2px;}

.rlist{padding:20px 28px;display:flex;flex-direction:column;gap:14px;contain:layout;}
.rcard{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px;animation:fadeIn 0.5s ease-out;transition:all 0.15s;}
.rcard:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(232,78,27,0.08);}
.rtop{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:36px;height:36px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dark);font-weight:500;flex-shrink:0;}
.rname{font-size:13px;font-weight:600;color:var(--dark);}
.rshop{font-size:11px;color:var(--dark3);}
.rtime{font-size:11px;color:var(--dark3);}
.rbody{font-size:13px;color:var(--dark2);line-height:1.75;font-weight:300;margin-bottom:10px;}
.rtags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:10px;padding:3px 8px;border-radius:4px;background:var(--bg3);color:var(--dark2);border:1px solid var(--border);}
.score-row{display:flex;align-items:center;gap:8px;}
.dots{display:flex;gap:3px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--bg3);border:1px solid var(--border2);}
.dot.on{background:var(--accent);border-color:var(--accent);}
.slabel{font-size:11px;color:var(--dark3);}
.sbadge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;margin-left:auto;}
.sbadge.good{background:rgba(91,168,118,0.12);color:var(--green);}
.sbadge.meh{background:var(--accent-light);color:var(--accent);}
.share-icons{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.share-btn{background:transparent;border:1px solid var(--border);color:var(--dark3);padding:5px 10px;border-radius:4px;font-size:11px;transition:all 0.15s;cursor:pointer;display:inline-flex;align-items:center;gap:4px;}
.share-btn:hover{border-color:var(--dark2);color:var(--dark);}

.ract-row{display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.btn-edit-r{background:transparent;color:var(--dark3);border:1px solid var(--border);padding:5px 12px;border-radius:6px;font-size:11px;transition:all 0.15s;cursor:pointer;}
.btn-edit-r:hover{color:var(--accent);border-color:var(--accent);}
.btn-del-r{background:transparent;color:var(--dark3);border:1px solid var(--border);padding:5px 12px;border-radius:6px;font-size:11px;transition:all 0.15s;cursor:pointer;}
.btn-del-r:hover{color:#e05555;border-color:#e05555;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(44,36,22,0.75);z-index:500;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.2s ease-out;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border:1px solid var(--border2);border-radius:18px;padding:28px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;position:relative;animation:slideUp 0.3s ease-out;box-shadow:0 20px 60px rgba(44,36,22,0.15);}
.modal h2{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;margin-bottom:4px;color:var(--dark);}
.msub{font-size:13px;color:var(--dark2);margin-bottom:20px;}
.fg{margin-bottom:16px;}
.flabel{font-size:11px;font-weight:600;color:var(--dark);margin-bottom:6px;display:block;letter-spacing:0.04em;}
.finput{width:100%;background:#fff;border:1px solid var(--border2);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--dark);outline:none;transition:border-color 0.15s;}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);}
.finput::placeholder{color:var(--dark3);}
textarea.finput{resize:vertical;min-height:90px;line-height:1.6;}
select.finput{appearance:none;cursor:pointer;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tag-opts{display:flex;gap:6px;flex-wrap:wrap;}
.topt{padding:5px 11px;border-radius:6px;font-size:11px;border:1px solid var(--border2);color:var(--dark3);background:transparent;transition:all 0.12s;cursor:pointer;}
.topt.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.score-sel{display:flex;gap:6px;}
.sopt{width:34px;height:34px;border-radius:6px;border:1px solid var(--border2);color:var(--dark3);background:transparent;font-size:13px;font-weight:500;transition:all 0.12s;cursor:pointer;}
.sopt.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.mactions{display:flex;gap:10px;margin-top:24px;}
.mactions .btn-primary{flex:1;padding:12px;}
.mclose{position:absolute;top:14px;right:14px;background:transparent;border:none;color:var(--dark3);font-size:18px;cursor:pointer;line-height:1;transition:color 0.15s;}
.mclose:hover{color:var(--dark);}
.ssl{display:flex;flex-direction:column;gap:7px;max-height:260px;overflow-y:auto;}
.ssi{padding:11px 14px;border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all 0.12s;display:flex;justify-content:space-between;align-items:center;}
.ssi:hover,.ssi.on{border-color:var(--green);background:var(--green-bg);}
.ssi-name{font-size:13px;color:var(--dark);font-family:'Noto Serif JP',serif;}
.ssi-sub{font-size:11px;color:var(--dark3);}

/* Success State */
.checkin-success{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:999;pointer-events:none;}
.confetti-item{position:fixed;pointer-events:none;}

.bpage{padding:48px 36px;padding-bottom:100px;}
.bpage h2{font-family:'Noto Serif JP',serif;font-size:clamp(24px,3.5vw,40px);font-weight:600;line-height:1.15;letter-spacing:-0.02em;margin-bottom:10px;color:var(--dark);}
.bpage-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-top:40px;}
.bvisual{background:var(--accent-light);border:1px solid rgba(232,78,27,0.2);border-radius:18px;padding:36px;text-align:center;}
.big-badge{display:inline-flex;align-items:center;gap:10px;background:rgba(91,168,118,0.15);border:2px solid var(--green);padding:16px 28px;border-radius:14px;margin-bottom:16px;}
.bb-text{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;color:var(--green);}
.price-box{margin-top:24px;padding-top:24px;border-top:1px solid rgba(232,78,27,0.2);}
.price-num{font-size:40px;font-weight:700;color:var(--dark);letter-spacing:-0.03em;}
.price-num span{font-size:16px;color:var(--dark3);font-weight:400;}
.price-label{font-size:12px;color:var(--dark3);margin-top:3px;}
.perks{display:flex;flex-direction:column;gap:18px;margin-top:28px;}
.perk{display:flex;gap:14px;}
.picon{width:34px;height:34px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:var(--accent);}
.ptitle{font-size:13px;font-weight:600;color:var(--dark);margin-bottom:3px;}
.pbody{font-size:12px;color:var(--dark2);font-weight:300;line-height:1.6;}
.regform{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:24px;margin-top:28px;}
.regform h3{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;margin-bottom:3px;color:var(--dark);}
.regform p{font-size:12px;color:var(--dark2);margin-bottom:16px;}
.success-msg{background:rgba(91,168,118,0.12);border:1px solid rgba(91,168,118,0.25);border-radius:8px;padding:14px;color:var(--green);font-size:13px;display:none;margin-top:14px;}
.stag{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);}

/* Footer */
footer{background:var(--bg2);border-top:1px solid var(--border);padding:40px 28px;text-align:center;margin-top:60px;}
.footer-brand{font-family:'Noto Serif JP',serif;font-size:16px;font-weight:600;color:var(--dark);margin-bottom:16px;}
.footer-links{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;font-size:13px;}
.footer-links a{color:var(--dark3);text-decoration:none;transition:color 0.15s;}
.footer-links a:hover{color:var(--dark);}
.footer-copy{font-size:12px;color:var(--dark3);margin-top:16px;}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:#fff;padding:11px 22px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;transition:transform 0.3s ease;pointer-events:none;display:flex;align-items:center;gap:8px;white-space:nowrap;box-shadow:0 4px 12px rgba(44,36,22,0.3);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:#e05555;color:#fff;}
.toast-icon{font-size:16px;}

.modal-title-edit{color:var(--accent);}

/* Admin */
.admin-bar{background:var(--accent);color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:500;position:fixed;top:63px;left:0;right:0;z-index:199;}
.admin-login{max-width:400px;margin:120px auto;padding:40px;background:#fff;border:1px solid var(--border2);border-radius:18px;text-align:center;box-shadow:0 4px 12px rgba(44,36,22,0.08);}
.admin-login h2{font-family:'Noto Serif JP',serif;font-size:22px;margin-bottom:8px;color:var(--dark);}
.admin-login p{font-size:13px;color:var(--dark2);margin-bottom:20px;}
.admin-section{padding:20px 28px;}
.admin-section h3{font-family:'Noto Serif JP',serif;font-size:18px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);color:var(--dark);}
.admin-item{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.admin-item-top{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.admin-item-info{flex:1;}
.admin-item-name{font-family:'Noto Serif JP',serif;font-size:14px;font-weight:600;color:var(--dark);}
.admin-item-sub{font-size:11px;color:var(--dark3);margin-top:2px;}
.admin-item-body{font-size:12px;color:var(--dark2);margin-top:8px;line-height:1.6;}
.admin-acts{display:flex;gap:6px;flex-shrink:0;}
